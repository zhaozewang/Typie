name: Typie
options:
  bundleIdPrefix: com.typie
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Typie:
    type: application
    platform: macOS
    sources:
      - path: Typie
        excludes:
          - "*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.typie.app
        INFOPLIST_FILE: Typie/Info.plist
        CODE_SIGN_ENTITLEMENTS: Typie/Typie.entitlements
        LS_UI_ELEMENT: YES
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
    entitlements:
      path: Typie/Typie.entitlements
